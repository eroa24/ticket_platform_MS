# =====================================================
# Docker Compose — Ticket Platform MS
# =====================================================
# Servicios:
#   1. dynamodb-local  → Amazon DynamoDB local (puerto 8000)
#   2. localstack      → SQS simulado (puerto 4566)
#   3. app             → Microservicio Spring Boot (puerto 8080)
# =====================================================

services:

  # -----------------------------------------------
  # DynamoDB Local
  # -----------------------------------------------
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: dynamodb-local
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8000"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - ticketing-net

  # -----------------------------------------------
  # LocalStack (SQS)
  # -----------------------------------------------
  # El script init-localstack.sh crea la cola automáticamente al arrancar.
  localstack:
    image: localstack/localstack:latest
    container_name: localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sqs
      - AWS_DEFAULT_REGION=us-east-1
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - "./infra/localstack/init-localstack.sh:/etc/localstack/init/ready.d/init-localstack.sh"
    healthcheck:
      test: ["CMD-SHELL", "awslocal sqs list-queues || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - ticketing-net

  # -----------------------------------------------
  # Ticket Platform MS
  # -----------------------------------------------
  # El microservicio Spring Boot. Espera a que DynamoDB y SQS estén healthy
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticket-platform
    ports:
      - "8080:8080"
    environment:
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - SQS_ENDPOINT=http://localstack:4566
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY=local
      - AWS_SECRET_KEY=local
      - SQS_PURCHASE_QUEUE=purchase-orders-queue
      - RESERVATION_TIMEOUT_MINUTES=10
      - RESERVATION_CLEANUP_RATE_MS=60000
    depends_on:
      dynamodb-local:
        condition: service_healthy
      localstack:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - ticketing-net

networks:
  ticketing-net:
    driver: bridge
